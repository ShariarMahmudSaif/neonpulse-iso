# NeonPulse OS - Hyprland Configuration
# Glassmorphic Phonk/Neon Cyberpunk Desktop

# Monitor setup (auto-detect)
monitor=,highrr,auto,auto

# Variables - Neon Color Palette
$neon_magenta = rgb(ff00ff)
$neon_cyan = rgb(00ffff)
$neon_pink = rgb(ff1493)
$neon_purple = rgb(9d00ff)
$dark_bg = rgb(0a0a0a)
$dark_surface = rgb(1a1a1a)

# General Settings
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    col.active_border = $neon_magenta $neon_cyan 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

# Decoration - Blur & Glass Effects
decoration {
    rounding = 18
    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
        xray = false
    }
    drop_shadow = yes
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(00000080)
    
    # Glass effect
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
}

# Animations
animations {
    enabled = true
    bezier = easeOutQuad, 0.25, 0.46, 0.45, 0.94
    bezier = easeInOutQuad, 0.42, 0, 0.58, 1
    animation = windows, 1, 4, easeOutQuad
    animation = windowsOut, 1, 4, easeOutQuad, slide
    animation = windowsMove, 1, 3, easeOutQuad
    animation = fade, 1, 2, easeInOutQuad
    animation = workspaces, 1, 3, easeInOutQuad, slide
    animation = specialWorkspace, 1, 3, easeInOutQuad, slidevert
}

# Input Devices
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    mouse_refocus = true
    numlock_by_default = false
    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }
}

# Gestures
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 200
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
}

# Workspace Configuration
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# Windowrule - App-specific behaviors
windowrule = float, ^(rofi)$
windowrule = nofocus, ^(rofi)$
windowrule = nomaxsize, ^(rofi)$
windowrule = size 1000 600, ^(rofi)$

windowrule = float, ^(pavucontrol)$
windowrule = size 800 600, ^(pavucontrol)$

# Gaming - Full screen without decorations
windowrule = fullscreen, ^(steam)$
windowrule = fullscreen, ^(lutris)$
windowrule = nofocus, ^(steam)$

# Blender - Large window
windowrule = size 1920 1080, ^(blender)$

# Streaming/Recording
windowrule = opacity 1.0, ^(obs|ffmpeg|obs-studio)$

# Bind Keys - Super = Windows/Meta key
$mod = SUPER

# Window Management
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, V, togglefloating,
bind = $mod, Space, exec, rofi -show drun -theme /usr/share/rofi/themes/neon-phonk.rasi
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, F, fullscreen,

# Focus Windows
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move Windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize Windows
bind = $mod CTRL, left, resizeactive, -50 0
bind = $mod CTRL, right, resizeactive, 50 0
bind = $mod CTRL, up, resizeactive, 0 -50
bind = $mod CTRL, down, resizeactive, 0 50

# Workspace Navigation
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move Window to Workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Terminal
bind = $mod, Return, exec, kitty

# Browser
bind = $mod, B, exec, brave

# File Manager
bind = $mod, E, exec, thunar

# Screenshot
bind = , Print, exec, flameshot gui
bind = $mod SHIFT, S, exec, flameshot gui

# Volume Control
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness Control
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock Screen
bind = $mod SHIFT, L, exec, hyprlock

# Resource Guard (cgroups limiter)
bind = $mod, R, exec, neonpulse-resource-guard

# Color Saturation Adjustment (Phonk effect)
bind = $mod SHIFT, C, exec, hyprctl keyword decoration:saturation 0.8

# Mouse Binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Source local config overrides (if exists)
source = ~/.config/hypr/hyprland.local.conf
